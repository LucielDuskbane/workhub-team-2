basePath: /api/v1
definitions:
  dto.CreateCompanyRequest:
    properties:
      company_name:
        type: string
      company_type:
        type: string
      description:
        type: string
    type: object
  dto.CreateJobRequest:
    properties:
      category:
        type: string
      description:
        type: string
      job_type:
        type: string
      location:
        type: string
      salary:
        type: integer
      title:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - admin
        - employer
        - jobseeker
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  dto.UpdateApplicationRequest:
    properties:
      status:
        type: string
    type: object
  dto.UpdateCompanyRequest:
    properties:
      company_name:
        type: string
      company_type:
        type: string
      description:
        type: string
    type: object
  dto.UpdateJobRequest:
    properties:
      category:
        type: string
      description:
        type: string
      job_type:
        type: string
      location:
        type: string
      salary:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
host: workhub-team-2-production.up.railway.app
info:
  contact: {}
  description: WorkHub Final Project API
  title: WorkHub API
  version: "1.0"
paths:
  /admin/companies/{id}/approve:
    patch:
      description: Admin approve company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Approve company
      tags:
      - Admin
  /admin/companies/{id}/reject:
    patch:
      description: Admin reject company
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reject company
      tags:
      - Admin
  /admin/companies/pending:
    get:
      description: Admin get pending companies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get pending companies
      tags:
      - Admin
  /admin/reports:
    get:
