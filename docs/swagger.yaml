      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update job
      tags:
      - Jobs
  /jobs/{id}/applications:
    get:
