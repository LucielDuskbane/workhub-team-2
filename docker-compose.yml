services:
  postgres:
    image: postgres:16
    container_name: workhub_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workhub_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: workhub_app
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      - postgres

volumes:
  postgres_data: